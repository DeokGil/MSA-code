apiVersion: apps/v1
kind: Deployment
# 파드(컨테이너)를 몇 개 띄울지, 어떤 이미지로 띄울지 정의
metadata:
  name: eureka-server
spec:
  replicas: 1  # 파드 1개 실행
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: project-eureka-server:latest
          imagePullPolicy: Never  # 로컬 이미지 사용 (minikube용)
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
# 파드에 접근할 수 있는 네트워크 엔드포인트 정의
metadata:
  name: eureka-server
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761